<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles/style.css"/>
  <title> Fisq!  - Flashcards</title>
<style>
    body {
        justify-content: flex-start;
    }
</style>
</head>
<body>
  <div class="cards-TopBar">
    <input class="cards-TopBar-Input" placeholder="Search...">
    <img src="../icons/search.png" style="padding: 5px; height: 30px; width:30px;" class="cards-TopBar-Button" onclick="window.location.href = ''">
  </div>
  <div class="section-settings">
    <p style="font-family:sans-serif; font-size: 20px; margin: 5px; color: white; font-weight: bold;"> Info </p>
    <div class="setting-container">
        <p class="setting-title"> Fisq! version </p>
        <p class="setting-description"> v1.0 (beta) - 2026.05.8 </p>
    </div>
    <div class="setting-container">
        <p class="setting-title"> Source Code </p>
        <p class="setting-description"> Whole Fisq! source code is avible on GitHub! </p>
        <div style="display: flex; flex-direction: row; width: 100%; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;">
          <button class="on-settings-page-button" onclick='window.open("https://github.com/franekk3/Fisq", "_blank");'> GitHub <img src="../icons/github.png" class="on-settings-page-button-icon"> </button>
          <button class="on-settings-page-button" onclick="window.location.href = '../docs/index.html'"> Docs <img src="../icons/document.png" class="on-settings-page-button-icon"> </button>
        </div>     
 
      </div>
      <div class="setting-container">
        <p class="setting-title"> Other (very important) info: </p>
        <div style="display: flex; flex-direction: row; width: 100%; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;">
          <button class="on-settings-page-button" onclick="window.location.href = './legal/credits.html'"> Credits <img src="../icons/heart.png" class="on-settings-page-button-icon"> </button>
          <button class="on-settings-page-button" onclick="window.location.href = './legal/terms.html'"> Terms of Use <img src="../icons/terms-info.png" class="on-settings-page-button-icon"> </button>
          <button class="on-settings-page-button" onclick="window.location.href = './legal/policy.html'"> Privacy Policy <img src="../icons/insurance.png" class="on-settings-page-button-icon"> </button>
        </div>
      </div> 
      </div>
</body>
</html>
