<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../styles/style.css"/>
  <title> Fisq!  - Flashcards</title>
</head>
<body>
  <div class="flashcard-bigger-box">
    <img class="flashcard-buttons" src="../icons/angle-small-left.png" onclick='changeIndex("-")'>
    <div class="flashcard-container" id="flashcard" onclick='rotate()'>
      <p id="flashcardContent" > Fisq! </p>
    </div>
    <img class="flashcard-buttons" src="../icons/angle-small-right.png" onclick='changeIndex("+")'>
  </div>
  <p style="color: var(--color-on-primary); font-weight: bold;" id="indexLabel"> 1 / 1 </p>
 
  <script>
  const indexLabel = document.getElementById('indexLabel');
  const flashcardContent = document.getElementById('flashcardContent');
  const flashcard = document.getElementById('flashcard');
  let index = 1;
  let setLen = 1;
  let side1 = "fisq!";
  let side2 = "2 side";
  let side = 1;
  let flashcardSet = [{side1: "fisq", side2: "fisq2"}, {side1: "strona1", side2: "strona2"}, {side1: "side1", side2: "side2"}]
  loadFromStorage();
  function loadSet() {
    setLen = flashcardSet.length;
  }
  loadSet()
  function rotate() {
    if (flashcard.classList.contains('flashcard-container2')) {
      flashcard.classList.remove('flashcard-container2');
      side = 1;
      updateSide()
    } else {
      flashcard.classList.add('flashcard-container2');
      side = 2;
      updateSide()

    }
      flashcard.classList.add('animation-rotate');
      flashcardContent.classList.add('animation-rotate');

      setTimeout(() => { flashcard.classList.remove('animation-rotate') }, 400);
      setTimeout(() => { flashcardContent.classList.remove('animation-rotate') }, 400);
  }
  function updateSide() {
    if (side === 1) {
      flashcardContent.textContent = flashcardSet[index - 1].side1;
    } else if (side === 2) {
      flashcardContent.textContent = flashcardSet[index - 1].side2;
    }
  }
  function changeIndex(d) {
    if (d === '-') {
      if (index > 1) {
        flashcard.classList.add('animation-move-left');
        setTimeout(() => { flashcard.classList.remove('animation-move-left') }, 400);
        index -= 1;
      } else {
         console.log("first flashcard");
         flashcard.classList.add('animation-shake');
         setTimeout(() => { flashcard.classList.remove('animation-shake') }, 400);
      }
    } else if (d === '+') {
      if (setLen > index) {
        flashcard.classList.add('animation-move-right');
        setTimeout(() => { flashcard.classList.remove('animation-move-right') }, 400);
        index += 1;
      } else {
         console.log("last flashcard");
         flashcard.classList.add('animation-shake');
         setTimeout(() => { flashcard.classList.remove('animation-shake') }, 400);
      }
      
    }
    updateSide()
    indexLabel.textContent = index + " / " + setLen;
  }
function loadFromStorage() {
    const savedData = localStorage.getItem('flashcardSet');
    if (savedData) {
        flashcardSet = JSON.parse(savedData);
    }
}
window.addEventListener('storage', (event) => {
  if (event.key === 'flashcardSet') {
    location.reload(); 
  }
});

  changeIndex()
  </script>
</body>
</html>
